systems:
  - title: Three.js Demos
    description: "A system for creating and running Three.js animations."
    tech: JavaScript / Three.js
    url: https://github.com/stevejtrettel/threejs-demos

  - title: Shader Sandbox
    description: "An npm package for running Shadertoy-like shaders and beyond easily on your local machine."
    tech: JavaScript / GLSL
    url: https://github.com/stevejtrettel/shader-sandbox

  - title: Path Tracer
    description: "Photorealistic rendering of signed distance fields via unidirectional path tracing in GLSL."
    tech: GLSL
    url: https://github.com/stevejtrettel/PathTracer

  - title: Geometric Optimization
    description: "Solving geometric embedding problems in various ambient spaces via optimization techniques."
    tech: Python, Javascript
    url: https://github.com/MPI-MiS-Mathematics-Lab/PyTorch-DDG
    collaborators: [mpi-math-lab]

projects:
  - title: Cubic Lines
    description: "Real time visualizations of cubic surfaces parameterized by six points in the projective plane."
    tech: Javascript / GLSL
    url: https://github.com/stevejtrettel/cubic-lines/
    collaborators: [gabriel-dorfsman-hopkins, claudio-gomez-gonzales]

  - title: Geodesic Boards
    description: "Computing geodesics on surfaces z=f(x,y) and exporting for CNC cutting."
    tech: Javascript
    url: https://github.com/stevejtrettel/geodesic-boards
    collaborators: [edmund-harriss]

  - title: Surfaces of Revolution
    description: "Visualizing surfaces of revolution embedded in the Thurston Geometries."
    tech: Javascript / Three.js
    url: https://github.com/FabianLander/SurfacesOfRevolution
    collaborators: [fabi-lander]

  - title: Constant Curvature Surfaces
    description: "Surfaces of revolution of constant curvature, textured by regions of the sphere or hyperbolic plane."
    url: https://github.com/stevejtrettel/spindle-earth
    collaborators: [stepan-paul]

