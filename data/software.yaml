# `slug` links to the project's page at stevejtrettel.site/software/<slug>/ .
# `status` (with no slug) shows an italic note in place of a link. `url` is the
# GitHub repo, kept for record (the CV links to the website page, not GitHub).

systems:
  - title: Three.js Demos
    description: "A TypeScript/three.js framework for interactive mathematical visualization: geodesic integration, parametric surfaces, curvature rendering, and GPU path tracing. It underlies most of my illustration code."
    tech: JavaScript / Three.js
    slug: threejs-demos
    url: https://github.com/stevejtrettel/threejs-demos

  - title: Shader Sandbox
    description: "A GLSL development environment and embeddable runtime, shipped as an npm package, for authoring and sharing mathematical shaders: PDE simulations, hyperbolic tilings, and other highly parallelizable computations."
    tech: JavaScript / GLSL
    slug: shader-sandbox
    url: https://github.com/stevejtrettel/shader-sandbox

  - title: Path Tracer
    description: "A GPU path tracer solving the rendering equation by Monte Carlo path integration, for photorealistic images of implicit surfaces and signed distance fields."
    tech: GLSL
    slug: path-tracer
    url: https://github.com/stevejtrettel/PathTracer

  # Removed for now (not yet developed); uncomment to restore.
  # - title: Math Lib
  #   description: "A TypeScript library for differential-geometric (and soon more general) computation: dimension-general Riemannian and symplectic structures, musical isomorphisms, and symplectic integrators, built for live animation and speed."
  #   tech: TypeScript / Three.js
  #   slug: math-lib
  #   url: https://github.com/stevejtrettel/math-lib

  - title: Homogeneous Spaces
    description: "Drawing geometrically-correct points, geodesics, curves, and surfaces in 2D and 3D homogeneous spaces — constant-curvature geometries, their Lorentzian cousins, and product spaces — through swappable coordinate models."
    tech: TypeScript / three.js
    slug: homogeneous-spaces
    url: https://github.com/stevejtrettel/homogeneous-spaces

  - title: Coxeter Visualizations
    description: "A visualization library for Coxeter groups in hyperbolic 2- and 3-space: from a polytope's combinatorics it finds the canonical hyperbolic realization, then draws tilings, Cayley graphs, and chosen subgroups."
    tech: TypeScript / Three.js
    slug: coxeter-viz
    url: https://github.com/stevejtrettel/coxeter-viz
    collaborators: [gordon-kirby]

  - title: Limit Sets
    description: "Viewers and high-resolution renderers for limit sets of matrix groups on projective space and flag varieties (Kleinian, Anosov, Hitchin, hypergeometric monodromy), scaling from a million points live to twenty billion offline."
    tech: TypeScript / Three.js
    slug: limit-sets
    url: https://github.com/stevejtrettel/limit-sets/

  - title: Geometric Optimization
    description: "A GPU-accelerated, differentiable mesh-physics platform that relaxes discrete surfaces under spring-mass and Coulomb energies, in any Riemannian ambient space with a computable geodesic distance."
    tech: Python, Javascript
    slug: geometric-optimization
    collaborators: [mpi-math-lab]

projects:
  - title: Cubic Lines
    description: "A live exploration of the moduli space of cubic surfaces with 27 real lines: six points in the plane determine the cubic and its lines, computed by projective linear algebra and drawn by GPU ray-marching."
    tech: Javascript / GLSL
    slug: cubic-lines
    url: https://github.com/stevejtrettel/cubic-lines/
    collaborators: [gabriel-dorfsman-hopkins, claudio-gomez-gonzales]

  - title: Geodesic Boards
    description: "A live editor for curved surfaces and their geodesics that respects a physical CNC machine's limits and exports geodesic position and normal data as toolpaths for engraving wooden models."
    tech: Javascript
    slug: geodesic-boards
    url: https://github.com/stevejtrettel/geodesic-boards
    collaborators: [edmund-harriss]

  - title: Constant Curvature Surfaces
    description: "Real-time surfaces of revolution of constant Gaussian curvature and their Dini twists, with shaders drawing geodesics and metrically-correct textures directly on each surface."
    slug: constant-curvature-surfaces
    url: https://github.com/stevejtrettel/spindle-earth
    collaborators: [stepan-paul]

  - title: Low-Vertex Flat Tori
    description: "Numerical discovery of flat, embedded polyhedral tori in 3-space (Schwartz's vertex-minimal construction), using Newton solvers, homotopy continuation, and gradient descent on high-codimension varieties."
    tech: TypeScript / Three.js
    slug: low-vertex-flat-tori
    url: https://github.com/FabianLander/low-vertex-flat-tori
    collaborators: [fabi-lander]

  - title: Variety Point Clouds
    description: "Samples point clouds on projective varieties of high dimension and codimension (including singularity links and Milnor fibers), projecting them into 3-space for research and illustration."
    tech: TypeScript / Three.js
    slug: variety-point-clouds
    url: https://github.com/FabianLander/variety-point-clouds
    collaborators: [fabi-lander]

  - title: Knitted Surfaces
    description: "Replaces a quad- or triangle-meshed surface with a tangle of curves: strand segments in a fundamental domain, plus symmetry data, are stitched into continuous tubes and exported to render."
    tech: JavaScript
    slug: knitted-surfaces
    url: https://github.com/stevejtrettel/knitted-surfaces
    collaborators: [mpi-math-lab]

  - title: Anosov
    description: "Searching for and rigorously certifying Anosov representations into higher-rank Lie groups."
    tech: TypeScript / Three.js
    status: In development
    collaborators: [max-riestenberg]

  - title: Starscapes
    description: "Real-time rendering of algebraic-number starscapes: the complex roots of integer polynomials, shaded by arithmetic invariants, revealing patterns from Diophantine approximation and the geometry of numbers."
    tech: TypeScript / GLSL
    slug: starscapes
    url: https://github.com/stevejtrettel/starscapes
    collaborators: [edmund-harriss, kate-stange]
