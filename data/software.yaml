systems:
  - title: Three.js Demos
    description: "A system for creating and running Three.js animations."
    tech: JavaScript / Three.js
    url: https://github.com/stevejtrettel/threejs-demos

  - title: Shader Sandbox
    description: "An npm package for running Shadertoy-style shaders locally."
    tech: JavaScript / GLSL
    url: https://github.com/stevejtrettel/shader-sandbox

  - title: Path Tracer
    description: "Photorealistic path tracing of signed distance fields in GLSL."
    tech: GLSL
    url: https://github.com/stevejtrettel/PathTracer

  - title: Math Lib
    description: "A TypeScript framework for geometry, topology, and algebra."
    tech: TypeScript / Three.js
    url: https://github.com/stevejtrettel/math-lib

  - title: Hyperbolic Polytopes
    description: "Convex polytopes, Coxeter groups, and tilings in hyperbolic space."
    tech: TypeScript / Three.js
    url: https://github.com/stevejtrettel/hyperbolic-polytopes/
    collaborators: [gordon-kirby]

  - title: Limit Sets
    description: "Limit sets of finitely-generated groups on projective space."
    tech: TypeScript / Three.js
    url: https://github.com/stevejtrettel/limit-sets/

  - title: Geometric Optimization
    description: "Solving geometric embedding problems via optimization."
    tech: Python, Javascript
    url: https://github.com/MPI-MiS-Mathematics-Lab/PyTorch-DDG
    collaborators: [mpi-math-lab]

projects:
  - title: Cubic Lines
    description: "Real-time cubic surfaces from six points in the projective plane."
    tech: Javascript / GLSL
    url: https://github.com/stevejtrettel/cubic-lines/
    collaborators: [gabriel-dorfsman-hopkins, claudio-gomez-gonzales]

  - title: Geodesic Boards
    description: "Computing geodesics on surfaces z=f(x,y) for CNC cutting."
    tech: Javascript
    url: https://github.com/stevejtrettel/geodesic-boards
    collaborators: [edmund-harriss]

  - title: Surfaces of Revolution
    description: "Surfaces of revolution embedded in the Thurston geometries."
    tech: Javascript / Three.js
    url: https://github.com/FabianLander/SurfacesOfRevolution
    collaborators: [fabi-lander]

  - title: Constant Curvature Surfaces
    description: "Constant-curvature surfaces, textured by sphere or hyperbolic plane."
    url: https://github.com/stevejtrettel/spindle-earth
    collaborators: [stepan-paul]

  - title: Low-Vertex Flat Tori
    description: "Numerically discovering low-complexity flat tori in 3-space."
    tech: TypeScript / Three.js
    url: https://github.com/FabianLander/low-vertex-flat-tori
    collaborators: [fabi-lander]

  - title: Variety Point Clouds
    description: "Sampling algebraic varieties in projective space as point clouds."
    tech: TypeScript / Three.js
    url: https://github.com/FabianLander/variety-point-clouds
    collaborators: [fabi-lander]

  - title: Woven Surfaces
    description: "Computing periodic woven designs on surfaces."
    tech: JavaScript
    url: https://github.com/erik2810/knitted-models
    collaborators: [mpi-math-lab]

